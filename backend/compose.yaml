services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      FOUNDRY_DATA_DIR: /app/.data
      FOUNDRY_DATABASE_URL: sqlite+aiosqlite:////app/.data/foundry.db
      FOUNDRY_MASTER_KEY_PATH: /app/.data/master.key
    volumes:
      - foundry_data:/app/.data
    restart: unless-stopped

volumes:
  foundry_data:

